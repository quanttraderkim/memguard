<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1320"/>
      <stop offset="1" stop-color="#162537"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="100" x2="980" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4B860"/>
      <stop offset="1" stop-color="#E3684B"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1320" height="680" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#091018" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>
  <circle cx="1100" cy="96" r="180" fill="#203548" fill-opacity="0.22"/>
  <circle cx="188" cy="612" r="220" fill="#1A2A3C" fill-opacity="0.4"/>

  <g filter="url(#shadow)">
    <rect x="58" y="60" width="1164" height="520" rx="28" fill="#0F1A28" fill-opacity="0.92" stroke="#233549"/>
  </g>

  <text x="96" y="132" fill="#F7FAFC" font-size="52" font-weight="700" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">InstructionGuard</text>
  <text x="96" y="176" fill="#9DB0C4" font-size="22" font-weight="500" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Local-first instruction persistence and memory integrity for AI agents</text>

  <g>
    <rect x="96" y="230" width="502" height="284" rx="22" fill="#131F2E" stroke="#283A4F"/>
    <text x="128" y="276" fill="#E7EDF4" font-size="24" font-weight="700" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Without InstructionGuard</text>
    <text x="128" y="314" fill="#9FB1C5" font-size="18" font-weight="500" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Saved instructions fade after retrieval misses and compaction.</text>

    <rect x="128" y="344" width="438" height="58" rx="14" fill="#0E1722" stroke="#24374C"/>
    <text x="148" y="380" fill="#F6F9FC" font-size="18" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">User: "Always answer informally"</text>
    <text x="148" y="430" fill="#7F95AD" font-size="16" font-weight="500" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">50 turns later...</text>

    <rect x="128" y="448" width="438" height="34" rx="10" fill="#3A1820"/>
    <text x="148" y="471" fill="#FFB4BD" font-size="15" font-weight="700" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Forgot during compaction</text>

    <text x="128" y="502" fill="#FFD4D9" font-size="19" font-weight="600" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Agent: "Good day. I will proceed formally."</text>
  </g>

  <g>
    <rect x="636" y="230" width="490" height="284" rx="22" fill="#161F18" stroke="#39503C"/>
    <text x="668" y="276" fill="#F1F7F1" font-size="24" font-weight="700" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">With InstructionGuard</text>
    <text x="668" y="314" fill="#B8C9BA" font-size="18" font-weight="500" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Protected instructions stay loaded and behavior stays observable.</text>

    <rect x="668" y="344" width="194" height="54" rx="14" fill="#112319" stroke="#2D5637"/>
    <text x="688" y="377" fill="#B8F3C1" font-size="17" font-weight="700" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Protected Zone</text>

    <rect x="882" y="344" width="194" height="54" rx="14" fill="#16211C" stroke="#44644B"/>
    <text x="902" y="377" fill="#D8F4DD" font-size="17" font-weight="700" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Compliance Check</text>

    <rect x="668" y="418" width="194" height="54" rx="14" fill="#1C2314" stroke="#63663A"/>
    <text x="688" y="451" fill="#F2F0BF" font-size="17" font-weight="700" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Drift Detection</text>

    <rect x="882" y="418" width="194" height="54" rx="14" fill="#241A13" stroke="#7A5438"/>
    <text x="902" y="451" fill="#FFD7BE" font-size="17" font-weight="700" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Action Integrity</text>

    <text x="668" y="503" fill="#F4FBF4" font-size="19" font-weight="600" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Agent: "Okay, let's do it."</text>
  </g>

  <path d="M610 372H620C628 372 636 364 636 356V356" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="610" cy="372" r="10" fill="#E97752"/>
  <circle cx="636" cy="356" r="10" fill="#F0B25D"/>

  <text x="96" y="556" fill="#F0B25D" font-size="17" font-weight="700" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Store is not enough.</text>
  <text x="270" y="556" fill="#D6DEE8" font-size="17" font-weight="500" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Protect, verify, and track instruction survival over time.</text>
</svg>
